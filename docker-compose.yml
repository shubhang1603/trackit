version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    container_name: my-postgres-container

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: myusername
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: